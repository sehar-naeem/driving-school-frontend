<div class="file-complaint-modern">
    <div class="page-header-premium">
        <div class="header-icon">
            <i class="bi bi-exclamation-triangle-fill"></i>
        </div>
        <div class="header-content">
            <h1>File a Complaint</h1>
            <p>Report any vehicle issues or concerns to the administration</p>
        </div>
    </div>

    <div class="form-container-premium">
        <form (ngSubmit)="onSubmit()" #complaintForm="ngForm">
            <!-- Success Message -->
            <div class="alert-premium success" *ngIf="successMessage">
                <i class="bi bi-check-circle-fill"></i>
                <div>
                    <strong>Success!</strong>
                    <p>{{ successMessage }}</p>
                </div>
            </div>
            
            <!-- Error Message -->
            <div class="alert-premium error" *ngIf="error">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <div>
                    <strong>Error</strong>
                    <p>{{ error }}</p>
                </div>
            </div>

            <!-- Form Steps -->
            <div class="form-steps">
                <div class="step active">
                    <div class="step-number">1</div>
                    <span>Vehicle</span>
                </div>
                <div class="step-line"></div>
                <div class="step active">
                    <div class="step-number">2</div>
                    <span>Details</span>
                </div>
                <div class="step-line"></div>
                <div class="step active">
                    <div class="step-number">3</div>
                    <span>Submit</span>
                </div>
            </div>

            <!-- Vehicle Selection -->
            <div class="form-section">
                <h3 class="section-title">
                    <i class="bi bi-car-front"></i>
                    Vehicle Information
                </h3>
                <div class="form-row">
                    <div class="form-group-premium">
                        <label class="form-label-premium">
                            Select Vehicle <span class="required">*</span>
                        </label>
                        <div class="input-wrapper-premium">
                            <i class="bi bi-car-front input-icon-premium"></i>
                            <select class="form-input-premium" [(ngModel)]="complaintData.vehicle_id" name="vehicle_id" required>
                                <option [value]="0">Choose a vehicle...</option>
                                <option *ngFor="let vehicle of vehicles" [value]="vehicle.id">
                                    {{ vehicle.registration_number }} - {{ vehicle.model }}
                                </option>
                            </select>
                        </div>
                        <small class="form-hint">Select the vehicle related to this issue</small>
                    </div>
                </div>
            </div>

            <!-- Issue Details -->
            <div class="form-section">
                <h3 class="section-title">
                    <i class="bi bi-info-circle"></i>
                    Issue Details
                </h3>
                <div class="form-row">
                    <div class="form-group-premium">
                        <label class="form-label-premium">
                            Issue Type <span class="required">*</span>
                        </label>
                        <div class="issue-type-grid">
                            <label class="issue-type-card" [class.selected]="complaintData.issue_type === 'mechanical'">
                                <input type="radio" name="issue_type" value="mechanical" [(ngModel)]="complaintData.issue_type">
                                <i class="bi bi-gear-fill"></i>
                                <span>Mechanical</span>
                            </label>
                            <label class="issue-type-card" [class.selected]="complaintData.issue_type === 'maintenance'">
                                <input type="radio" name="issue_type" value="maintenance" [(ngModel)]="complaintData.issue_type">
                                <i class="bi bi-wrench"></i>
                                <span>Maintenance</span>
                            </label>
                            <label class="issue-type-card" [class.selected]="complaintData.issue_type === 'accident'">
                                <input type="radio" name="issue_type" value="accident" [(ngModel)]="complaintData.issue_type">
                                <i class="bi bi-exclamation-octagon-fill"></i>
                                <span>Accident</span>
                            </label>
                            <label class="issue-type-card" [class.selected]="complaintData.issue_type === 'safety'">
                                <input type="radio" name="issue_type" value="safety" [(ngModel)]="complaintData.issue_type">
                                <i class="bi bi-shield-fill-exclamation"></i>
                                <span>Safety</span>
                            </label>
                            <label class="issue-type-card" [class.selected]="complaintData.issue_type === 'other'">
                                <input type="radio" name="issue_type" value="other" [(ngModel)]="complaintData.issue_type">
                                <i class="bi bi-three-dots"></i>
                                <span>Other</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-group-premium">
                        <label class="form-label-premium">
                            Priority Level <span class="required">*</span>
                        </label>
                        <div class="priority-selector">
                            <label class="priority-option low" [class.selected]="complaintData.priority === 'low'">
                                <input type="radio" name="priority" value="low" [(ngModel)]="complaintData.priority">
                                <i class="bi bi-info-circle"></i>
                                <span>Low</span>
                            </label>
                            <label class="priority-option medium" [class.selected]="complaintData.priority === 'medium'">
                                <input type="radio" name="priority" value="medium" [(ngModel)]="complaintData.priority">
                                <i class="bi bi-dash-circle"></i>
                                <span>Medium</span>
                            </label>
                            <label class="priority-option high" [class.selected]="complaintData.priority === 'high'">
                                <input type="radio" name="priority" value="high" [(ngModel)]="complaintData.priority">
                                <i class="bi bi-exclamation-circle"></i>
                                <span>High</span>
                            </label>
                            <label class="priority-option urgent" [class.selected]="complaintData.priority === 'urgent'">
                                <input type="radio" name="priority" value="urgent" [(ngModel)]="complaintData.priority">
                                <i class="bi bi-exclamation-triangle"></i>
                                <span>Urgent</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group-premium full-width">
                        <label class="form-label-premium">
                            Complaint Title <span class="required">*</span>
                        </label>
                        <div class="input-wrapper-premium">
                            <i class="bi bi-pencil input-icon-premium"></i>
                            <input type="text" class="form-input-premium"
                                placeholder="Brief description (e.g., 'Brake not working properly')"
                                [(ngModel)]="complaintData.title" name="title" required maxlength="200">
                        </div>
                        <div class="char-counter">
                            {{ complaintData.title.length }}/200 characters
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group-premium full-width">
                        <label class="form-label-premium">
                            Detailed Description <span class="required">*</span>
                        </label>
                        <textarea 
                            class="form-textarea-premium" 
                            rows="6"
                            placeholder="Provide detailed information about the issue..."
                            [(ngModel)]="complaintData.description" 
                            name="description" 
                            required>
                        </textarea>
                    </div>
                </div>
            </div>

            <!-- Form Actions -->
            <div class="form-actions-premium">
                <button 
                    type="button" 
                    class="btn-secondary-premium" 
                    routerLink="/instructor/dashboard"
                    [disabled]="loading">
                    <i class="bi bi-x-circle"></i>
                    Cancel
                </button>
                <button 
                    type="button" 
                    class="btn-outline-premium" 
                    (click)="resetForm()"
                    [disabled]="loading">
                    <i class="bi bi-arrow-clockwise"></i>
                    Reset
                </button>
                <button 
                    type="submit" 
                    class="btn-submit-premium" 
                    [disabled]="loading || !complaintForm.form.valid">
                    <span *ngIf="!loading">
                        <i class="bi bi-send-fill"></i>
                        Submit Complaint
                    </span>
                    <span *ngIf="loading">
                        <span class="spinner-premium"></span>
                        Submitting...
                    </span>
                </button>
            </div>
        </form>
    </div>
</div>
