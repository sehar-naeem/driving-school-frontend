<nav class="navbar-modern" [class.scrolled]="isScrolled">
  <div class="navbar-content">
    <!-- Left Section -->
    <div class="navbar-left">
      <button 
        class="menu-toggle-btn" 
        (click)="toggleSidebar.emit()" 
        type="button"
        aria-label="Toggle sidebar">
        <i class="bi bi-list"></i>
      </button>
      <div class="navbar-title">
        <h2>Driving School Management</h2>
        <p class="navbar-breadcrumb">{{ getCurrentPageTitle() }}</p>
      </div>
    </div>

    <!-- Right Section -->
    <div class="navbar-right">
      <!-- Search -->
      <div class="search-wrapper">
        <i class="bi bi-search search-icon"></i>
        <input 
          type="search" 
          class="search-input" 
          placeholder="Search..."
          aria-label="Search">
      </div>

      <!-- Notifications -->
      <div class="navbar-action">
        <button 
          class="action-btn" 
          (click)="toggleNotifications()"
          type="button"
          aria-label="Notifications">
          <i class="bi bi-bell-fill"></i>
          <span class="notification-count" *ngIf="notificationCount > 0">
            {{ notificationCount }}
          </span>
        </button>
      </div>

      <!-- Profile Dropdown -->
      <div class="profile-dropdown">
        <button 
          class="profile-btn" 
          (click)="toggleProfile()"
          type="button"
          aria-label="Profile menu">
          <div class="profile-avatar">
            {{ getUserInitial() }}
          </div>
          <div class="profile-info" *ngIf="currentUser">
            <span class="profile-name">
              {{ currentUser.full_name || 'User' }}
            </span>
            <span class="profile-role">{{ currentUser.role || 'Admin' }}</span>
          </div>
          <i class="bi bi-chevron-down dropdown-icon"></i>
        </button>

        <!-- Dropdown Menu -->
        <div class="dropdown-menu" [class.show]="showProfileMenu">
          <div class="dropdown-header" *ngIf="currentUser">
            <div class="dropdown-avatar">
              {{ getUserInitial() }}
            </div>
            <div class="dropdown-user-info">
              <h4>{{ currentUser.full_name || 'User' }}</h4>
              <p>{{ currentUser.email || 'user@example.com' }}</p>
            </div>
          </div>
          
          <div class="dropdown-divider"></div>
          
          <button class="dropdown-item" type="button">
            <i class="bi bi-person"></i>
            <span>My Profile</span>
          </button>
          
          <button class="dropdown-item" type="button">
            <i class="bi bi-gear"></i>
            <span>Settings</span>
          </button>
          
          <div class="dropdown-divider"></div>
          
          <button 
            class="dropdown-item logout-item" 
            (click)="logout()"
            type="button">
            <i class="bi bi-box-arrow-right"></i>
            <span>Logout</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>
